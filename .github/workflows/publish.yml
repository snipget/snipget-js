# Publish the `snipget` package to npm.
#
# Triggered by publishing a GitHub Release tagged `vX.Y.Z` (matching
# package.json's version — the guard below fails the run on a mismatch).
#
# Auth: npm Trusted Publishing (OIDC) — configure on npmjs.com under the
# package's Settings → Trusted Publisher (org `snipget`, repo
# `snipget-js`, workflow `publish.yml`, environment `npm`). Until the
# package exists, npm can't be configured that way, so the FIRST publish
# happens locally (`npm publish` from a logged-in maintainer); every
# release after that flows through here tokenlessly. Provenance
# attestations kick in automatically once the repo is public.

name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build, verify, publish
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/snipget
    permissions:
      contents: read
      # Required for npm Trusted Publishing — mints the OIDC token the
      # npm CLI exchanges for a short-lived publish credential.
      id-token: write
    steps:
      - uses: actions/checkout@v5

      # registry-url is required: npm's OIDC Trusted-Publishing detection keys
      # off the explicitly-configured registry. (On a capable npm >= 11.5.1 the
      # OIDC path takes precedence over the empty `_authToken` setup-node writes;
      # the earlier empty-token 404 was only because Node 22's npm 10.x had no
      # OIDC support and fell back to that token. Omitting registry-url instead
      # gives ENEEDAUTH because npm never initiates the exchange.)
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # OIDC Trusted Publishing needs npm >= 11.5.1. Upgrade in its OWN step so
      # the refreshed npm is on PATH for the publish step below (doing the
      # upgrade and `npm publish` in one step left the old npm active, so npm
      # never attempted the OIDC exchange and just asked for a login token).
      - name: Use an OIDC-capable npm
        run: |
          npm install -g npm@latest
          npm --version

      - name: Verify release tag matches package version
        # Read the tag from the release event payload, not GITHUB_REF_NAME:
        # for a `release` event whose tag targets a branch, the ref can resolve
        # to the branch (GITHUB_REF_NAME=main) rather than the tag, which made
        # this guard misfire. github.event.release.tag_name is the canonical tag.
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${TAG_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag $TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install, check, build
        run: |
          npm ci
          npx tsc --noEmit
          npm test
          npm run build

      # Tokenless publish: the OIDC-capable npm (above) exchanges the GitHub
      # id-token for a short-lived credential against the package's Trusted
      # Publisher config. No NODE_AUTH_TOKEN, no registry-url auth.
      - name: Publish
        run: |
          echo "OIDC id-token endpoint present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}${ACTIONS_ID_TOKEN_REQUEST_URL:-NO}"
          npm publish
